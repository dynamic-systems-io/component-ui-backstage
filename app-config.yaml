app:
  title: development-system
  baseUrl: http://backstage.localhost:8080

organization:
  name: dynamic-systems-io

backend:
  baseUrl: http://backstage.localhost:8080
  listen:
    port: 7007
  cors:
    origin: http://backstage.localhost:8080
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  reading:
    allow:
      - host: raw.githubusercontent.com
      - host: github.com
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}

integrations:
  github:
    - host: github.com

auth:
  environment: development
  providers:
    github:
      development:
        clientId: ${AUTH_GITHUB_CLIENT_ID}
        clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}
        signIn:
          resolvers:
            - resolver: usernameMatchingUserEntityName
              dangerouslyAllowSignInWithoutUserInCatalog: true

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow: [Component, System, API, Resource, Location, User, Group]
  locations:
    - type: url
      target: https://raw.githubusercontent.com/dynamic-systems-io/component-operator-resource/main/catalog-info.yaml
    - type: url
      target: https://raw.githubusercontent.com/dynamic-systems-io/component-operator-property/main/catalog-info.yaml
    - type: url
      target: https://raw.githubusercontent.com/dynamic-systems-io/component-operator-sensor/main/catalog-info.yaml
    - type: url
      target: https://raw.githubusercontent.com/dynamic-systems-io/component-operator-actuator/main/catalog-info.yaml
    - type: url
      target: https://raw.githubusercontent.com/dynamic-systems-io/component-operator-system/main/catalog-info.yaml
    - type: url
      target: https://raw.githubusercontent.com/dynamic-systems-io/component-operator-platform/main/catalog-info.yaml
    - type: url
      target: https://raw.githubusercontent.com/dynamic-systems-io/component-operator-deployment/main/catalog-info.yaml
    - type: url
      target: https://raw.githubusercontent.com/dynamic-systems-io/component-operator-simulation/main/catalog-info.yaml
    - type: url
      target: https://raw.githubusercontent.com/dynamic-systems-io/component-operator-catalog/main/catalog-info.yaml
    - type: url
      target: https://raw.githubusercontent.com/dynamic-systems-io/component-operator-dataset/main/catalog-info.yaml
    - type: url
      target: https://raw.githubusercontent.com/dynamic-systems-io/component-operator-distribution/main/catalog-info.yaml
